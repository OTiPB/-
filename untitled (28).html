<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Чек-лист ОТиПБ</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%D0%A7%D0%B5%D0%BA-%D0%BB%D0%B8%D1%81%D1%82%20%D0%9E%D0%A2%D0%B8%D0%9F%D0%91%22%2C%22short_name%22%3A%22%D0%9E%D0%A2%D0%B8%D0%9F%D0%91%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%231a1a1a%22%2C%22theme_color%22%3A%22%231a1a1a%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Crect%20width%3D'100'%20height%3D'100'%20rx%3D'20'%20fill%3D'%2327ae60'%2F%3E%3Ctext%20x%3D'50'%20y%3D'65'%20font-size%3D'50'%20text-anchor%3D'middle'%20fill%3D'white'%20font-family%3D'sans-serif'%3E%E2%9C%93%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="ОТиПБ">
    <meta name="theme-color" content="#1a1a1a">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a; padding: 10px; max-width: 100%; margin: 0 auto;
            color: #e0e0e0;
        }
        h1 { font-size: 1.2rem; text-align: center; margin: 10px 0; color: #ffffff; }
        h3 { margin: 10px 0 5px; color: #ffffff; }
        .tabs { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
        .tab {
            flex: 1; padding: 10px 4px; background: #2a2a2a; border: 1px solid #444;
            border-radius: 8px; font-weight: bold; font-size: 0.65rem; color: #ccc;
            cursor: pointer; transition: 0.2s; text-align: center; min-width: 45px;
        }
        .tab.active { background: #ffffff; color: #1a1a1a; border-color: #ffffff; }
        .checklist, .summary, .chairman-panel, .report {
            background: #222; border-radius: 12px; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.5); margin-bottom: 10px;
        }
        .header-fields { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .field-group { display: flex; flex-direction: column; flex: 1; min-width: 45%; }
        .field-group label { font-weight: bold; font-size: 0.8rem; color: #aaa; }
        .field-group input { padding: 8px; border: 1px solid #444; border-radius: 6px; font-size: 0.85rem; background: #333; color: #fff; }
        .item { display: flex; flex-direction: column; border-bottom: 1px solid #333; padding: 8px 0; }
        .item-header { display: flex; align-items: flex-start; }
        .item-num { font-weight: bold; color: #fff; margin-right: 6px; white-space: nowrap; }
        .item-text { flex: 1; font-size: 0.85rem; line-height: 1.3; color: #ddd; }
        .grade-buttons { display: flex; gap: 8px; margin-top: 4px; justify-content: flex-end; flex-wrap: wrap; }
        .grade-btn {
            width: 38px; height: 38px; border-radius: 50%; border: 2px solid #555;
            background: #333; font-weight: bold; font-size: 0.9rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.15s; color: #ccc;
        }
        .grade-btn.selected { border-color: #fff; background: #fff; color: #1a1a1a; }
        .grade-btn.zero.selected { background: #c0392b; border-color: #c0392b; color: #fff; }
        .grade-btn.one.selected { background: #e67e22; border-color: #e67e22; color: #fff; }
        .grade-btn.two.selected { background: #27ae60; border-color: #27ae60; color: #fff; }
        .block-title { font-weight: bold; color: #fff; margin: 15px 0 4px; border-bottom: 2px solid #444; padding-bottom: 2px; }
        .block-extra { background: #2a2a2a; padding: 8px; border-radius: 8px; margin-top: 8px; }
        .block-extra textarea { width: 100%; height: 50px; margin: 5px 0; font-size: 0.8rem; padding: 5px; background: #333; color: #fff; border: 1px solid #444; border-radius: 4px; }
        .block-extra label { font-weight: bold; font-size: 0.75rem; display: block; margin-top: 5px; color: #aaa; }
        .photos-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .photo-thumb { position: relative; width: 70px; height: 70px; }
        .photo-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
        .delete-photo-btn {
            position: absolute; top: -6px; right: -6px; background: #c0392b; color: white;
            border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer;
        }
        .add-photo-btn { background: #fff; color: #1a1a1a; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; margin-top: 5px; font-weight: bold; }
        .block-score-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; background: #1a1a1a; padding: 6px 8px; border-radius: 6px; flex-wrap: wrap; }
        .block-score-row label { font-weight: bold; font-size: 0.8rem; color: #ddd; }
        .block-score-row input { width: 70px; padding: 5px; border: 1px solid #555; border-radius: 4px; text-align: center; font-size: 0.9rem; background: #333; color: #fff; }
        .block-score-row .auto-score { font-size: 0.7rem; color: #888; margin-left: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; margin: 10px 0; }
        th, td { padding: 5px 3px; border-bottom: 1px solid #444; text-align: center; color: #ddd; }
        th { background: #fff; color: #1a1a1a; font-size: 0.65rem; }
        td:first-child { text-align: left; }
        .avg { font-weight: bold; background: #2a2a2a; color: #fff; }
        .total { font-size: 1.1rem; font-weight: bold; margin: 10px 0; text-align: right; color: #fff; }
        .btn {
            display: block; width: 100%; padding: 10px; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; margin: 5px 0; font-size: 0.85rem;
        }
        .btn.primary { background: #fff; color: #1a1a1a; }
        .btn.file { background: #2980b9; color: white; }
        .btn.html { background: #8e44ad; color: white; }
        .btn.pdf { background: #e74c3c; color: white; }
        .btn.copy { background: #27ae60; color: white; }
        .btn.install { background: #f39c12; color: white; display: none; }
        .btn.secondary { background: #444; color: #ddd; }
        .note { font-size: 0.7rem; color: #888; text-align: center; margin-top: 5px; }
        .confirm-row { display: flex; align-items: center; gap: 10px; margin: 15px 0; color: #ddd; }
        .confirm-row input[type=checkbox] { 
            width: 24px; height: 24px; accent-color: #fff; 
            background: #333; border: 2px solid #555; border-radius: 4px;
            appearance: none; -webkit-appearance: none; cursor: pointer; position: relative;
        }
        .confirm-row input[type=checkbox]:checked {
            background: #27ae60; border-color: #27ae60;
        }
        .confirm-row input[type=checkbox]:checked::after {
            content: '✓'; color: white; font-size: 18px; font-weight: bold;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .error-border { border: 2px solid #c0392b !important; background-color: #3a1a1a !important; }
        .report-block { margin-bottom: 15px; }
        .report-block textarea { width: 100%; height: 80px; margin: 5px 0; font-size: 0.8rem; padding: 5px; background: #333; color: #fff; border: 1px solid #444; border-radius: 4px; }
        .report-photo { max-width: 150px; border-radius: 6px; margin: 4px; }
        .compact-badge { background: #333; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; color: #aaa; }
        .storage-info { background: #2a2a00; padding: 8px; border-radius: 6px; margin: 10px 0; font-size: 0.75rem; color: #ddd; }
        .file-upload-area {
            border: 2px dashed #555; padding: 15px; text-align: center; border-radius: 8px;
            margin: 10px 0; cursor: pointer; background: #2a2a2a; color: #aaa;
        }
        .file-upload-area:hover { border-color: #fff; color: #fff; }
        .file-upload-area input { display: none; }
        .readonly-text {
            background: #2a2a2a; padding: 10px; border-radius: 6px; white-space: pre-wrap;
            font-size: 0.8rem; border: 1px solid #444; min-height: 60px; color: #ddd;
        }
        .empty-in-print { }
        .report-summary-table { margin: 15px 0; }
        .report-summary-table th { background: #fff; color: #1a1a1a; font-size: 0.65rem; }
        .report-summary-table .highlight-row { background: #2a2a2a; font-weight: bold; color: #fff; }
        .report-summary-table .total-row { background: #1a3a1a; font-weight: bold; font-size: 0.75rem; color: #fff; }
        .developer-credit { text-align: center; font-size: 0.6rem; color: #555; margin-top: 20px; padding-top: 10px; border-top: 1px solid #333; }
        
        /* PWA install banner */
        .install-banner {
            display: none; position: fixed; bottom: 0; left: 0; right: 0;
            background: #2a2a2a; border-top: 2px solid #f39c12; padding: 12px;
            z-index: 1000; text-align: center;
        }
        .install-banner.show { display: block; }
        .install-banner p { margin-bottom: 8px; font-size: 0.85rem; color: #fff; }
        .install-banner .btn { display: inline-block; width: auto; padding: 8px 20px; margin: 0 5px; }
        
        @media print {
            body { background: white !important; padding: 0; color: #000 !important; }
            .tabs, .btn, .note, .storage-info, .install-banner { display: none !important; }
            .report { box-shadow: none; padding: 0; background: white !important; }
            textarea { border: none; background: transparent; resize: none; color: #000 !important; }
            .empty-in-print { display: none !important; }
            .checklist, .summary, .chairman-panel, .report, .block-extra, .block-score-row, .readonly-text, .file-upload-area { background: white !important; color: #000 !important; }
            .item-text, .field-group label, .block-extra label, .block-score-row label, .total, h1, h3, .confirm-row, .readonly-text, .report-summary-table .highlight-row { color: #000 !important; }
            th { background: #000 !important; color: #fff !important; }
            .report-summary-table th { background: #000 !important; color: #fff !important; }
            .report-summary-table .total-row { background: #ddd !important; color: #000 !important; }
            .grade-btn.selected { border-color: #000 !important; background: #000 !important; color: #fff !important; }
            .btn { display: none !important; }
            .developer-credit { color: #999 !important; }
        }
    </style>
</head>
<body>

<!-- PWA Install Banner -->
<div class="install-banner" id="installBanner">
    <p>📲 Установите как приложение для удобной работы</p>
    <button class="btn install" id="installBtn">Установить</button>
    <button class="btn secondary" id="dismissBtn">Закрыть</button>
</div>

<h1>📋 Чек-лист состояния ОТиПБ в цехе</h1>
<div class="tabs" id="tabs">
    <button class="tab active" data-tab="check">📝 Мои оценки</button>
    <button class="tab" data-tab="chairman">👔 Председатель</button>
    <button class="tab" data-tab="summary">📊 Сводная</button>
    <button class="tab" data-tab="report">📄 Отчёт</button>
</div>
<div id="content"></div>

<script>
    // ============ PWA ============
    let deferredPrompt;
    const installBanner = document.getElementById('installBanner');
    const installBtn = document.getElementById('installBtn');
    const dismissBtn = document.getElementById('dismissBtn');

    // Слушаем событие beforeinstallprompt
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Показываем баннер через 2 секунды
        setTimeout(() => {
            if (deferredPrompt) installBanner.classList.add('show');
        }, 2000);
    });

    // Кнопка "Установить"
    installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`Установка: ${outcome}`);
        deferredPrompt = null;
        installBanner.classList.remove('show');
    });

    // Кнопка "Закрыть"
    dismissBtn.addEventListener('click', () => {
        installBanner.classList.remove('show');
        // Запомним, что пользователь отказался
        localStorage.setItem('pwa_banner_dismissed', Date.now());
    });

    // Если уже установлено или недавно отказался — не показываем
    if (window.matchMedia('(display-mode: standalone)').matches) {
        installBanner.style.display = 'none';
    }
    const dismissed = localStorage.getItem('pwa_banner_dismissed');
    if (dismissed && (Date.now() - parseInt(dismissed)) < 7 * 24 * 60 * 60 * 1000) {
        // Не показываем 7 дней после отказа
    }

    // Регистрируем Service Worker для кеширования
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            // Создаём минимальный SW прямо в HTML через Blob
            const swCode = `
                const CACHE_NAME = 'otipb-v1';
                const urlsToCache = [
                    '/',
                    'index.html'
                ];
                self.addEventListener('install', event => {
                    event.waitUntil(
                        caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache))
                    );
                    self.skipWaiting();
                });
                self.addEventListener('activate', event => {
                    event.waitUntil(
                        caches.keys().then(keys => Promise.all(
                            keys.filter(key => key !== CACHE_NAME).map(key => caches.delete(key))
                        ))
                    );
                    self.clients.claim();
                });
                self.addEventListener('fetch', event => {
                    event.respondWith(
                        caches.match(event.request).then(response => response || fetch(event.request))
                    );
                });
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(err => {
                // Игнорируем ошибку регистрации SW (может не работать в некоторых браузерах)
                console.log('SW registration optional:', err);
            });
        });
    }

    // ============ ЧЕК-ЛИСТ ============
    const CRITERIA = [
        { id: "1.1", text: "Применение спецодежды, касок, очков, перчаток без замечаний" },
        { id: "1.2", text: "Противогазы/респираторы: наличие проверено, сроки, паспорта выборочно проверены" },
        { id: "1.3", text: "Знание действий при аварии (опрос)" },
        { id: "2.1", text: "Ограждения опасных зон (вращающиеся части)" },
        { id: "2.2", text: "Отсутствие утечек, чистота полов" },
        { id: "2.3", text: "Освещение на рабочих местах проверено" },
        { id: "3.1", text: "Эвакуационные выходы свободны" },
        { id: "3.2", text: "Огнетушители на месте, опломбированы" },
        { id: "3.3", text: "Проверки пожарной сигнализации предоставлены" },
        { id: "4.1", text: "Маркировка ёмкостей, трубопроводов" },
        { id: "4.2", text: "Знаки безопасности на местах" },
        { id: "4.3", text: "Инструкции на рабочих местах имеются, действующие и в удовлетворительном состоянии" }
    ];
    
    const EXTRA_CRITERIA = [
        { id: "5.1", text: "Динамика изменений" },
        { id: "5.2", text: "Оперативность и качество устранения замечаний" },
        { id: "5.3", text: "Корпоративный и командный дух в подразделении" },
        { id: "5.4", text: "Вовлеченность цеха в спортивную жизнь" },
        { id: "5.5", text: "Участие в соревнованиях и конкурсах по ОТиПБ" },
        { id: "5.6", text: "Вовлеченность в улучшения по ОТ" }
    ];

    const BLOCKS = ['1','2','3','4'];
    const blockNames = { '1': '🧤 СИЗ и персонал', '2': '⚙️ Опасные зоны', '3': '🔥 Пожарная безопасность', '4': '🏷️ Маркировка и документация' };
    const STORAGE_MY = 'myFullData_v29';
    const STORAGE_CHAIRMAN = 'chairmanData_v29';
    const STORAGE_IMPORTS = 'importedFullData_v29';
    const STORAGE_REPORT = 'reportData_v29';
    const NUM_EXPERTS = 4;

    let myData = {
        workshop: '', checkDate: '', masterName: '', brigadeNumber: '',
        confirmed: false,
        scores: new Array(CRITERIA.length).fill(-1),
        blocks: {}
    };
    
    let chairmanData = {
        extraScores: new Array(EXTRA_CRITERIA.length).fill(-1),
        conclusions: '',
        recommendations: ''
    };
    
    let reportData = {
        signatures: ''
    };
    
    BLOCKS.forEach(b => myData.blocks[b] = { note: '', photos: [], tasks: '', deadline: '', overallScore: '' });
    let importedData = {};

    function getBlockIndices(blockId) {
        const start = CRITERIA.findIndex(c => c.id.startsWith(blockId + '.'));
        const end = CRITERIA.findLastIndex(c => c.id.startsWith(blockId + '.'));
        return { start, end };
    }

    function calcBlockAutoScore(blockId, scores) {
        const { start, end } = getBlockIndices(blockId);
        let sum = 0, count = 0;
        for (let i = start; i <= end; i++) {
            if (scores[i] >= 0) { sum += scores[i]; count++; }
        }
        return count > 0 ? (sum / count).toFixed(2) : '0.00';
    }

    function downloadFile(content, filename, type = 'application/json') {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function downloadHTML(content, filename) {
        const blob = new Blob([content], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function exportToFile(data, prefix) {
        const json = JSON.stringify({ ...data, timestamp: new Date().toISOString() }, null, 2);
        const name = prompt('Имя файла:', prefix + '_' + (data.workshop || 'check') + '_' + new Date().toISOString().slice(0,10) + '.json');
        if (name) downloadFile(json, name);
    }

    function parseImportedJSON(text) {
        if (!text || !text.trim()) throw new Error('Пустой файл');
        return JSON.parse(text.trim());
    }

    function loadMyData() {
        const saved = localStorage.getItem(STORAGE_MY);
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                myData.workshop = parsed.workshop || '';
                myData.checkDate = parsed.checkDate || '';
                myData.masterName = parsed.masterName || '';
                myData.brigadeNumber = parsed.brigadeNumber || '';
                myData.confirmed = parsed.confirmed || false;
                if (parsed.scores && parsed.scores.length === CRITERIA.length) myData.scores = parsed.scores;
                if (parsed.blocks) BLOCKS.forEach(b => { if (parsed.blocks[b]) myData.blocks[b] = parsed.blocks[b]; });
            } catch(e) { resetMyData(); }
        } else { resetMyData(); }
    }
    
    function loadChairmanData() {
        const saved = localStorage.getItem(STORAGE_CHAIRMAN);
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (parsed.extraScores && parsed.extraScores.length === EXTRA_CRITERIA.length) chairmanData.extraScores = parsed.extraScores;
                chairmanData.conclusions = parsed.conclusions || '';
                chairmanData.recommendations = parsed.recommendations || '';
            } catch(e) { 
                chairmanData.extraScores = new Array(EXTRA_CRITERIA.length).fill(-1);
                chairmanData.conclusions = '';
                chairmanData.recommendations = '';
            }
        }
    }
    
    function loadReportData() {
        const saved = localStorage.getItem(STORAGE_REPORT);
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                reportData.signatures = parsed.signatures || '';
            } catch(e) { reportData = { signatures: '' }; }
        }
    }
    
    function resetMyData() {
        myData.workshop = ''; myData.checkDate = ''; myData.masterName = ''; myData.brigadeNumber = '';
        myData.confirmed = false;
        myData.scores = new Array(CRITERIA.length).fill(-1);
        myData.blocks = {};
        BLOCKS.forEach(b => myData.blocks[b] = { note: '', photos: [], tasks: '', deadline: '', overallScore: '' });
    }
    
    function saveMyData() { localStorage.setItem(STORAGE_MY, JSON.stringify(myData)); }
    function saveChairmanData() { localStorage.setItem(STORAGE_CHAIRMAN, JSON.stringify(chairmanData)); }
    function saveReportData() { localStorage.setItem(STORAGE_REPORT, JSON.stringify(reportData)); }
    
    function loadImportedData() {
        const saved = localStorage.getItem(STORAGE_IMPORTS);
        importedData = saved ? (() => { try { return JSON.parse(saved); } catch(e) { return {}; } })() : {};
    }
    function saveImportedData() { localStorage.setItem(STORAGE_IMPORTS, JSON.stringify(importedData)); }

    let currentTab = 'check';
    function render() {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`[data-tab="${currentTab}"]`).classList.add('active');
        const container = document.getElementById('content');
        if (currentTab === 'check') renderChecklist(container);
        else if (currentTab === 'chairman') renderChairmanPanel(container);
        else if (currentTab === 'summary') renderSummary(container);
        else if (currentTab === 'report') renderReport(container);
    }

    async function compressImage(file) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = () => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > 400) { h = h * 400 / w; w = 400; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
                img.src = reader.result;
            };
            reader.readAsDataURL(file);
        });
    }

    function escapeHtml(text) { return String(text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function calcStats() {
        loadImportedData();
        const experts = [myData];
        for (let i = 1; i < NUM_EXPERTS; i++) {
            const key = 'expert' + (i + 1);
            experts.push(importedData[key]?.scores ? importedData[key] : { scores: [], blocks: {} });
        }

        let totalBasic = 0, countBasic = 0;
        CRITERIA.forEach((item, idx) => {
            let sum = 0, cnt = 0;
            experts.forEach(e => { const v = e.scores?.[idx]; if (v >= 0) { sum += v; cnt++; } });
            if (cnt) { totalBasic += sum / cnt; countBasic++; }
        });

        let totalExtra = 0, countExtra = 0;
        EXTRA_CRITERIA.forEach((item, idx) => {
            const val = chairmanData.extraScores?.[idx];
            if (val >= 0) { totalExtra += val; countExtra++; }
        });

        const maxBasic = CRITERIA.length * 2;
        const maxExtra = EXTRA_CRITERIA.length * 5;
        const basicPercent = countBasic ? (totalBasic / (countBasic * 2) * 100).toFixed(1) : 0;
        const extraPercent = countExtra ? (totalExtra / (countExtra * 5) * 100).toFixed(1) : 0;

        const blockScores = BLOCKS.map(block => {
            const { start, end } = getBlockIndices(block);
            let sum = 0, cnt = 0;
            for (let i = start; i <= end; i++) {
                experts.forEach(e => { const v = e.scores?.[i]; if (v >= 0) { sum += v; cnt++; } });
            }
            const maxBlock = (end - start + 1) * 2;
            return { 
                block: blockNames[block], 
                avg: cnt ? (sum / cnt).toFixed(2) : '-', 
                max: maxBlock, 
                percent: cnt ? (sum / (cnt * 2) * 100).toFixed(1) : 0 
            };
        });

        const totalSum = totalBasic + totalExtra;
        const totalMax = maxBasic + maxExtra;
        const totalPercent = ((totalBasic + totalExtra) / (maxBasic + maxExtra) * 100).toFixed(1);

        return {
            blockScores,
            totalBasic, maxBasic, basicPercent,
            totalExtra, maxExtra, extraPercent,
            totalSum, totalMax, totalPercent
        };
    }

        });
    }

    function renderReport(container) {
        const stats = calcStats();
        const allPhotos = [];
        BLOCKS.forEach(block => {
            const bd = myData.blocks[block];
            if (bd.photos && bd.photos.length > 0) {
                bd.photos.forEach(p => allPhotos.push({ block: blockNames[block], photo: p }));
            }
        });

        const hasConclusions = chairmanData.conclusions && chairmanData.conclusions.trim();
        const hasRecommendations = chairmanData.recommendations && chairmanData.recommendations.trim();

        let html = `
            <div class="storage-info">
                📍 <strong>Сохранение:</strong> «💾 Сохранить» — в память браузера | «📁 JSON» — скачать .json | «🌐 HTML» — скачать полный .html | «📄 PDF» — печать в PDF
            </div>
            <h3>📄 Отчёт о состоянии ОТиПБ</h3>
            <p style="font-size:0.8rem; color:#aaa;">Цех №${myData.workshop || '___'} | Дата: ${myData.checkDate || '______'}</p>`;

        html += `<h3>📊 Сводная таблица итогов</h3>
            <div class="report-summary-table">
                <table>
                    <thead><tr><th>Категория</th><th>Балл</th><th>Максимум</th><th>%</th></tr></thead>
                    <tbody>
                        ${stats.blockScores.map(bs => `<tr><td>${bs.block}</td><td>${bs.avg}</td><td>${bs.max}</td><td>${bs.percent}%</td></tr>`).join('')}
                        <tr class="highlight-row"><td><strong>Основные критерии</strong></td><td><strong>${stats.totalBasic.toFixed(2)}</strong></td><td><strong>${stats.maxBasic}</strong></td><td><strong>${stats.basicPercent}%</strong></td></tr>
                        <tr class="highlight-row"><td><strong>Дополнительные критерии</strong></td><td><strong>${stats.totalExtra.toFixed(0)}</strong></td><td><strong>${stats.maxExtra}</strong></td><td><strong>${stats.extraPercent}%</strong></td></tr>
                        <tr class="total-row"><td><strong>ИТОГО</strong></td><td><strong>${stats.totalSum.toFixed(2)}</strong></td><td><strong>${stats.totalMax}</strong></td><td><strong>${stats.totalPercent}%</strong></td></tr>
                    </tbody>
                </table>
            </div>`;

        html += `<div class="report-block ${hasConclusions ? '' : 'empty-in-print'}">
            <label><strong>Выводы комиссии:</strong></label>
            <div class="readonly-text">${hasConclusions ? escapeHtml(chairmanData.conclusions) : '<span style="color:#888;">Не заполнены (заполняются во вкладке «Председатель»)</span>'}</div>
        </div>`;

        if (allPhotos.length > 0) {
            html += `<div class="report-block">
                <label><strong>📷 Фото нарушений (${allPhotos.length}):</strong></label>
                <div style="display:flex; flex-wrap:wrap; gap:5px; margin-top:5px;">`;
            allPhotos.forEach(p => {
                html += `<div>
                    <img src="${p.photo}" class="report-photo" alt="Фото">
                    <div style="font-size:0.6rem; text-align:center; color:#aaa;">${p.block}</div>
                </div>`;
            });
            html += `</div></div>`;
        }

        html += `<div class="report-block ${hasRecommendations ? '' : 'empty-in-print'}">
            <label><strong>Рекомендации по улучшению:</strong></label>
            <div class="readonly-text">${hasRecommendations ? escapeHtml(chairmanData.recommendations) : '<span style="color:#888;">Не заполнены (заполняются во вкладке «Председатель»)</span>'}</div>
        </div>`;

        html += `<h4>📋 Задачи и сроки</h4>`;
        let hasTasks = false;
        BLOCKS.forEach(block => {
            const bd = myData.blocks[block];
            if (bd.tasks || bd.deadline) {
                hasTasks = true;
                html += `<div style="margin:5px 0; padding:5px; background:#2a2a2a; border-radius:5px;">
                    <strong>${blockNames[block]}</strong><br>
                    ${bd.tasks ? `📝 ${escapeHtml(bd.tasks)}<br>` : ''}
                    ${bd.deadline ? `📅 Срок: ${bd.deadline}` : ''}
                </div>`;
            }
        });
        if (!hasTasks) html += `<p style="color:#888;">Нет задач.</p>`;

        html += `<div class="report-block">
            <label><strong>Подписи членов комиссии:</strong></label>
            <textarea id="reportSignatures">${escapeHtml(reportData.signatures)}</textarea>
        </div>`;

        html += `<div class="developer-credit">Разработал Фаткуллин М.Н.</div>`;

        html += `<button class="btn copy" id="saveReportBtn">💾 Сохранить (в браузер)</button>
                 <button class="btn file" id="fileReportBtn">📁 Сохранить JSON</button>
                 <button class="btn html" id="htmlReportBtn">🌐 Сохранить HTML</button>
                 <button class="btn pdf" id="pdfReportBtn">📄 Сохранить PDF</button>`;
        container.innerHTML = html;

        document.getElementById('saveReportBtn').onclick = () => {
            reportData.signatures = document.getElementById('reportSignatures').value;
            saveReportData();
            alert('✅ Отчёт сохранён в память браузера!');
        };

        document.getElementById('fileReportBtn').onclick = () => {
            reportData.signatures = document.getElementById('reportSignatures').value;
            saveReportData();
            const report = {
                workshop: myData.workshop,
                checkDate: myData.checkDate,
                conclusions: chairmanData.conclusions,
                recommendations: chairmanData.recommendations,
                signatures: reportData.signatures,
                summary: {
                    blocks: stats.blockScores,
                    basic: { total: stats.totalBasic.toFixed(2), max: stats.maxBasic, percent: stats.basicPercent },
                    extra: { total: stats.totalExtra.toFixed(0), max: stats.maxExtra, percent: stats.extraPercent },
                    total: { total: stats.totalSum.toFixed(2), max: stats.totalMax, percent: stats.totalPercent }
                },
                photos: allPhotos,
                tasks: BLOCKS.map(b => ({
                    block: blockNames[b],
                    task: myData.blocks[b].tasks,
                    deadline: myData.blocks[b].deadline
                })).filter(t => t.task || t.deadline),
                timestamp: new Date().toISOString()
            };
            exportToFile(report, 'report');
        };

        document.getElementById('htmlReportBtn').onclick = () => {
            reportData.signatures = document.getElementById('reportSignatures').value;
            saveReportData();
            const htmlContent = generateFullHTML();
            const name = prompt('Имя файла:', 'checklist_full_' + (myData.workshop || 'check') + '_' + new Date().toISOString().slice(0,10) + '.html');
            if (name) downloadHTML(htmlContent, name);
        };

        document.getElementById('pdfReportBtn').onclick = () => {
            reportData.signatures = document.getElementById('reportSignatures').value;
            saveReportData();
            window.print();
        };
    }

    document.getElementById('tabs').addEventListener('click', e => {
        if (e.target.classList.contains('tab')) {
            currentTab = e.target.dataset.tab;
            render();
        }
    });

    loadMyData();
    loadChairmanData();
    loadReportData();
    loadImportedData();
    render();
</script>
</body>
</html>
